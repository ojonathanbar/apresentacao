<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Pro Builder - Papo de Alcance</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --dark: #1e293b; --blue: #2563eb; --blue-light: #eff6ff; --gray: #f8fafc; --border: #e2e8f0; --accent: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #cbd5e1; display: flex; min-height: 100vh; }
        
        /* PAINEL DE CONTROLE */
        #painel { width: 450px; background: #fff; padding: 25px; border-right: 1px solid var(--border); height: 100vh; overflow-y: auto; position: fixed; box-shadow: 2px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Inter'; }
        
        .service-card { background: var(--gray); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 12px; }
        .sub-options { background: #fff; padding: 10px; border-radius: 6px; border: 1px dashed var(--border); margin-top: 10px; }
        .sub-options .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
        .sub-options input { width: 60px; padding: 4px; }
        
        .btn-gerar { width: 100%; background: var(--blue); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }

        /* PREVIEW PDF */
        #preview { margin-left: 450px; flex: 1; padding: 40px; display: flex; justify-content: center; }
        .page { background: white; width: 800px; min-height: 1131px; padding: 50px 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        .category-block { margin-bottom: 35px; display: none; }
        .cat-title { font-family: 'Montserrat', sans-serif; font-size: 18px; color: var(--dark); border-bottom: 2px solid var(--blue-light); padding-bottom: 8px; margin-bottom: 20px; }
        .serv-list { list-style: none; padding-left: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; }
        .serv-list li { font-size: 12.5px; color: #334155; position: relative; padding-left: 20px; }
        .serv-list li::before { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--accent); position: absolute; left: 0; }
        
        .price-box { background: var(--blue-light); border-radius: 8px; padding: 20px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .val-destaque { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 800; color: var(--blue); }
        .footer-contato { background: var(--dark); color: white; padding: 25px 60px; position: absolute; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;}

        @media print { #painel { display: none; } #preview { margin-left: 0; padding: 0; } .page { box-shadow: none; } }
    </style>
</head>
<body>

    <div id="painel">
        <h2>Papo de Alcance</h2>
        <div class="form-group"><label>Cliente</label><input type="text" id="nomeCliente" value="Barbearia No Trato!" oninput="atualizar()"></div>
        
        <div class="service-card">
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="chk-social" checked onchange="atualizar()"> <strong>Gestão de Social Media</strong>
            </div>
            <input type="number" id="val-social" value="897" oninput="atualizar()" placeholder="Valor Mensal">
            
            <div class="sub-options">
                <div class="input-row"><input type="number" id="qtd-posts" value="12" oninput="atualizar()"> Posts no Feed</div>
                <div class="input-row"><input type="number" id="qtd-reels" value="4" oninput="atualizar()"> Roteiros de Reels</div>
                <div class="input-row"><input type="number" id="qtd-stories" value="20" oninput="atualizar()"> Stories Mensais</div>
            </div>
        </div>

        <button class="btn-gerar" onclick="window.print()">Salvar PDF</button>
    </div>

    <div id="preview">
        <div class="page">
            <h1 id="display-cliente">Barbearia No Trato!</h1>
            
            <div id="cat-presenca" class="category-block" style="display:block;">
                <h2 class="cat-title"><i class="fa-solid fa-hashtag"></i> Fase 2: Gestão de Presença</h2>
                <h3>Social Media: Gestão Estratégica</h3>
                <div id="desc-social"></div>

                <div class="price-box">
                    <div>Investimento Mensal</div>
                    <div id="val-box-presenca" class="val-destaque">R$ 897</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formataBRL(valor) { return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function atualizar() {
            document.getElementById('display-cliente').innerText = document.getElementById('nomeCliente').value;
            
            // Lógica Social Media
            let posts = document.getElementById('qtd-posts').value;
            let reels = document.getElementById('qtd-reels').value;
            let stories = document.getElementById('qtd-stories').value;
            let valor = document.getElementById('val-social').value;

            let html = `<ul class="serv-list">
                <li><strong>${posts} Postagens no Feed:</strong> Design autoral e copy persuasiva.</li>
                <li><strong>${reels} Roteiros de Reels:</strong> Direcionados para atração e viralização.</li>
                <li><strong>${stories} Stories:</strong> Sequência estratégica para engajamento diário.</li>
                <li><strong>Copywriting Persuasivo:</strong> Legendas focadas em converter leitura em agendamento.</li>
            </ul>`;
            
            document.getElementById('desc-social').innerHTML = html;
            document.getElementById('val-box-presenca').innerText = formataBRL(valor);
        }
        window.onload = atualizar;
    </script>
</body>
</html>
