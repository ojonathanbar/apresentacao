<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Papo de Alcance — Proposal Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f1f5f9;
    --panel: #0f172a;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --primary: #1d4ed8;
    --accent: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; }

body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

/* PAINEL */
#panel { width:420px; background:var(--panel); color:white; padding:28px; height:100vh; overflow-y:auto; position:fixed; }
.logo h1 { font-family:'Montserrat',sans-serif; font-size:30px; font-weight:800; color: white; }
.logo span { color:var(--accent); }
.block { margin-top:20px; background:rgba(255,255,255,.05); border-radius:12px; padding:16px; }
.block-title { font-size:11px; text-transform:uppercase; color:#94a3b8; margin-bottom:12px; font-weight:700; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:11px; color:#94a3b8; margin-bottom:4px; }
.form-group input, .form-group textarea { width:100%; padding:10px; border-radius:8px; border:none; background:#1e293b; color:white; }
.check { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; }
.check input[type="number"] { width:80px; padding:6px; background:#1e293b; border:none; color:white; border-radius:4px; }
.generate-btn { width:100%; margin-top:20px; padding:16px; border:none; border-radius:10px; background:var(--primary); color:white; font-weight:700; cursor:pointer; }

/* PREVIEW */
#preview { flex:1; margin-left:420px; padding:40px; display:flex; justify-content:center; }
.page { width:210mm; background:white; padding:50px; box-shadow:0 0 20px rgba(0,0,0,0.1); }

/* CONTENT STYLES */
.hero { background:#0f172a; color:white; padding:40px; border-radius:16px; margin-bottom:30px; }
.hero h1 { font-family:'Montserrat', sans-serif; font-size:32px; margin-bottom:10px; }
.hero .brand h2 { color:white; font-size:24px; margin-bottom:10px; }
.section { margin-bottom:40px; }
.section-title { font-family:'Montserrat', sans-serif; font-size:24px; margin-bottom:15px; color:#0f172a; }
.cards { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.card { border:1px solid #e2e8f0; border-radius:12px; padding:20px; }
.card h3 { font-size:16px; margin-bottom:10px; color:#1e293b; }
.card ul { list-style:none; margin-bottom:15px; }
.card li { font-size:13px; color:#475569; margin-bottom:5px; }
.price-area { border-top:1px solid #e2e8f0; padding-top:10px; }
.installment { font-size:18px; font-weight:700; color:#1d4ed8; }
.full-price { font-size:12px; color:#64748b; }
.timeline { border-left:2px solid #e2e8f0; padding-left:20px; }
.timeline-item { margin-bottom:20px; }

/* PRINT */
@media print {
    body { background: white; }
    #panel { display: none; }
    #preview { margin: 0; padding: 0; }
    .page { box-shadow: none; width: 100%; padding: 0; }
    .section { break-inside: auto; margin-bottom: 20px; }
    .card { break-inside: avoid; border: 1px solid #cbd5e1; }
    .hero { background: #0f172a !important; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>

<div id="panel">
    <div class="logo"><h1>Papo de <span>Alcance</span></h1></div>
    <div class="block">
        <div class="block-title">Cliente</div>
        <div class="form-group"><label>Nome</label><input type="text" id="clientName" value="Barbearia No Trato" oninput="render()"></div>
    </div>
    <div class="block">
        <div class="block-title">Fundação</div>
        <div class="check"><label><input type="checkbox" id="c-gmn" checked onchange="render()"> GMN</label><input type="number" id="v-gmn" value="597" oninput="render()"></div>
        <div class="check"><label><input type="checkbox" id="c-lp" checked onchange="render()"> Landing Page</label><input type="number" id="v-lp" value="997" oninput="render()"></div>
    </div>
    <div class="block">
        <div class="block-title">Social & Tráfego</div>
        <div class="check"><label><input type="checkbox" id="c-social" checked onchange="render()"> Gestão</label><input type="number" id="v-social" value="1497" oninput="render()"></div>
        <div class="check"><label><input type="checkbox" id="c-meta" checked onchange="render()"> Meta Ads</label><input type="number" id="v-meta" value="997" oninput="render()"></div>
    </div>
    <button class="generate-btn" onclick="window.print()">IMPRIMIR PROPOSTA</button>
</div>

<div id="preview">
    <div class="page" id="proposalContent">
        <section class="hero">
            <div class="brand"><h2>Papo de <span>Alcance</span></h2></div>
            <h1>Estratégia Digital</h1>
            <p id="out-client" style="font-weight:700; font-size:20px;"></p>
        </section>
        <div id="dynamicContent"></div>
    </div>
</div>

<script>
function money(v) { return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }

function render() {
    document.getElementById('out-client').innerText = document.getElementById('clientName').value;
    let html = '<section class="section"><h2 class="section-title">Fundação Digital</h2><div class="cards" id="f-cards"></div></section>';
    html += '<section class="section"><h2 class="section-title">Operação</h2><div class="cards" id="o-cards"></div></section>';
    document.getElementById('dynamicContent').innerHTML = html;

    let fCards = '';
    ['gmn', 'lp'].forEach(id => {
        if(document.getElementById(`c-${id}`).checked) {
            let v = parseFloat(document.getElementById(`v-${id}`).value);
            let installment = (v / (1 - 0.1238)) / 12;
            fCards += `<div class="card"><h3>${id.toUpperCase()}</h3><div class="price-area"><div class="installment">12x de ${money(installment)}</div><div class="full-price">ou à vista ${money(v)}</div></div></div>`;
        }
    });
    document.getElementById('f-cards').innerHTML = fCards;

    let oCards = '';
    if(document.getElementById('c-social').checked) oCards += `<div class="card"><h3>Social Media</h3><p>Gestão de conteúdo mensal</p><div class="price-area"><div class="installment">${money(document.getElementById('v-social').value)}</div></div></div>`;
    if(document.getElementById('c-meta').checked) oCards += `<div class="card"><h3>Meta Ads</h3><p>Gestão de anúncios</p><div class="price-area"><div class="installment">${money(document.getElementById('v-meta').value)}</div></div></div>`;
    document.getElementById('o-cards').innerHTML = oCards;
}
render();
</script>
</body>
</html>
