<!-- SUBSTITUA SOMENTE ESTA PARTE DO SEU SCRIPT -->

<script>

function money(v){

    return Number(v).toLocaleString(
        'pt-BR',
        {
            style:'currency',
            currency:'BRL'
        }
    );

}

function render(){

    document.getElementById('out-client').innerText =
    document.getElementById('clientName').value;

    document.getElementById('out-diagnostic').innerText =
    document.getElementById('diagnostic').value;

    let foundationHTML = '';
    let foundationTotal = 0;
    let installmentsHTML = '';

    const foundation = [

        {
            id:'gmn',
            title:'Google Meu Negócio Estratégico',
            items:[
                'SEO local',
                'Gestão de reputação',
                'Conversão local'
            ]
        },

        {
            id:'lp',
            title:'Landing Page de Conversão',
            items:[
                'Copy persuasiva',
                'Integração WhatsApp',
                'Estrutura de vendas'
            ]
        },

        {
            id:'site',
            title:'Site Institucional Premium',
            items:[
                'Design responsivo',
                'SEO técnico',
                'Alta performance'
            ]
        },

        {
            id:'ecom',
            title:'E-commerce Profissional',
            items:[
                'Checkout otimizado',
                'Integrações completas',
                'Escalabilidade'
            ]
        }

    ];

    foundation.forEach(s=>{

        if(document.getElementById(`c-${s.id}`).checked){

            const value =
            parseFloat(
                document.getElementById(`v-${s.id}`).value || 0
            );

            const parcelas =
            parseInt(
                document.getElementById(`p-${s.id}`).value
            );

            foundationTotal += value;

            foundationHTML += `

                <div class="card">

                    <h3>${s.title}</h3>

                    <ul>
                        ${s.items.map(i=>`<li>${i}</li>`).join('')}
                    </ul>

                </div>

            `;

            /* ========================= */
            /* NOVO CARD DE PARCELAMENTO */
            /* ========================= */

            installmentsHTML += `

                <div class="installment-card" style="
                    border:2px solid #2563eb;
                    background:linear-gradient(135deg,#eff6ff,#ffffff);
                    position:relative;
                    overflow:hidden;
                ">

                    <div style="
                        position:absolute;
                        top:0;
                        right:0;
                        background:#2563eb;
                        color:white;
                        padding:8px 14px;
                        font-size:11px;
                        font-weight:800;
                        letter-spacing:.08em;
                        border-bottom-left-radius:12px;
                    ">
                        PARCELAMENTO
                    </div>

                    <div class="installment-top">

                        <div>

                            <strong style="
                                display:block;
                                font-size:18px;
                                margin-bottom:6px;
                            ">
                                ${s.title}
                            </strong>

                            <span style="
                                color:#64748b;
                                font-size:13px;
                            ">
                                Valor total:
                                ${money(value)}
                            </span>

                        </div>

                    </div>

                    <!-- BLOCO DE DESTAQUE -->

                    <div style="
                        margin-top:18px;
                        padding:26px;
                        background:#0f172a;
                        border-radius:20px;
                        color:white;
                        text-align:center;
                    ">

                        <div style="
                            font-size:13px;
                            text-transform:uppercase;
                            letter-spacing:.08em;
                            color:#93c5fd;
                            margin-bottom:10px;
                            font-weight:700;
                        ">
                            Via Nubank Tap
                        </div>

                        <div style="
                            font-size:18px;
                            color:#cbd5e1;
                            margin-bottom:10px;
                        ">
                            Apenas
                        </div>

                        <div style="
                            font-size:54px;
                            line-height:1;
                            font-family:'Montserrat',sans-serif;
                            font-weight:800;
                            color:white;
                        ">
                            ${parcelas}x
                        </div>

                        <div style="
                            font-size:18px;
                            margin-top:12px;
                            color:#93c5fd;
                        ">
                            de
                        </div>

                        <div style="
                            font-size:42px;
                            line-height:1.1;
                            font-family:'Montserrat',sans-serif;
                            font-weight:800;
                            color:#10b981;
                            margin-top:8px;
                        ">
                            ${money(value / parcelas)}
                        </div>

                        <div style="
                            margin-top:14px;
                            color:#94a3b8;
                            font-size:13px;
                        ">
                            no cartão de crédito
                        </div>

                    </div>

                </div>

            `;

        }

    });

    document.getElementById('foundationCards').innerHTML =
    foundationHTML;

    document.getElementById('foundationPrice').innerText =
    money(foundationTotal);

    document.getElementById('foundationInstallments').innerHTML =
    installmentsHTML;

    // SOCIAL

    if(document.getElementById('c-social').checked){

        const posts =
        document.getElementById('n-posts').value;

        const reels =
        document.getElementById('n-reels').value;

        const stories =
        document.getElementById('n-stories').value;

        document.getElementById('socialCards').innerHTML = `

            <div class="card">

                <h3>
                    Posicionamento & Conteúdo
                </h3>

                <ul>

                    <li>${posts} posts estratégicos mensais</li>

                    <li>${reels} roteiros de reels</li>

                    <li>${stories} stories estratégicos</li>

                    <li>Copywriting persuasivo</li>

                    <li>Calendário editorial</li>

                </ul>

            </div>

        `;

        document.getElementById('socialPrice').innerText =
        money(
            document.getElementById('v-social').value
        );

    }

    // ADS

    let adsHTML = '';
    let adsTotal = 0;

    if(document.getElementById('c-meta').checked){

        adsTotal += parseFloat(
            document.getElementById('v-meta').value || 0
        );

        adsHTML += `

            <div class="card">

                <h3>
                    Meta Ads
                </h3>

                <ul>

                    <li>Campanhas Instagram/Facebook</li>

                    <li>Remarketing estratégico</li>

                    <li>Segmentação geográfica</li>

                </ul>

            </div>

        `;
    }

    if(document.getElementById('c-google').checked){

        adsTotal += parseFloat(
            document.getElementById('v-google').value || 0
        );

        adsHTML += `

            <div class="card">

                <h3>
                    Google Ads
                </h3>

                <ul>

                    <li>Google Pesquisa e Maps</li>

                    <li>Palavras-chave estratégicas</li>

                    <li>Captação qualificada</li>

                </ul>

            </div>

        `;
    }

    document.getElementById('adsCards').innerHTML =
    adsHTML;

    document.getElementById('adsPrice').innerText =
    money(adsTotal);

    document.getElementById('adBudgetOut').innerText =
    money(
        document.getElementById('adBudget').value
    );

}

function addTimelineItem(){

    const timeline =
    document.getElementById('timeline');

    const div =
    document.createElement('div');

    div.className = 'timeline-item';

    div.innerHTML = `

        <h4 contenteditable="true">
            Nova Etapa
        </h4>

        <p contenteditable="true">
            Clique aqui para editar esta etapa.
        </p>

    `;

    timeline.appendChild(div);

}

render();

</script>
