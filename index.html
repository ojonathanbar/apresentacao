<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Papo de Alcance — Proposal Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#f1f5f9;
    --panel:#0f172a;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --primary:#1d4ed8;
    --accent:#10b981;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

/* PAINEL */
#panel{ width:420px; background:var(--panel); color:white; padding:28px; position:fixed; height:100vh; overflow-y:auto; }
.logo h1{ font-family:'Montserrat',sans-serif; font-size:34px; line-height:1; font-weight:800; }
.logo span{ color:var(--accent); }
.logo p{ margin-top:10px; color:#94a3b8; line-height:1.7; font-size:14px; }
.block{ margin-top:22px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:18px; }
.block-title{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:#cbd5e1; margin-bottom:16px; font-weight:700; }
.form-group{ margin-bottom:16px; }
.form-group label{ display:block; margin-bottom:6px; font-size:12px; color:#94a3b8; font-weight:600; }
.form-group input, .form-group textarea{ width:100%; padding:12px; border:none; border-radius:10px; background:#111827; color:white; border:1px solid rgba(255,255,255,.08); }
.form-group textarea{ min-height:100px; resize:vertical; }
.check{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; background:rgba(255,255,255,.03); padding:12px; border-radius:12px; }
.check-left{ display:flex; align-items:center; gap:10px; font-size:14px; }
.check input[type="number"]{ width:110px; padding:10px; border:none; border-radius:8px; background:#111827; color:white; }
.metric-input{ margin-bottom:12px; }
.metric-input label{ display:block; margin-bottom:6px; font-size:12px; color:#94a3b8; }
.metric-input input{ width:100%; padding:12px; border:none; border-radius:10px; background:#111827; color:white; }
.generate-btn{ width:100%; margin-top:24px; padding:18px; border:none; border-radius:14px; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:white; font-weight:700; cursor:pointer; font-size:15px; }

/* PREVIEW */
#preview{ flex:1; margin-left:420px; padding:40px; display:flex; justify-content:center; }
.page{ width:210mm; background:white; box-shadow: 0 0 0 1px rgba(0,0,0,.05), 0 20px 40px rgba(0,0,0,.08); }

/* HERO */
.hero{ background:#020617; color:white; padding:52px; }
.brand{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:40px; }
.brand h2{ font-family:'Montserrat',sans-serif; font-size:40px; font-weight:800; line-height:1; }
.brand h2 span{ color:var(--accent); }
.brand p{ margin-top:12px; color:#cbd5e1; }
.whatsapp{ text-align:right; }
.whatsapp small{ display:block; color:#94a3b8; margin-bottom:6px; }
.whatsapp strong{ font-size:20px; font-family:'Montserrat',sans-serif; }
.hero h1{ font-size:46px; line-height:1.1; font-family:'Montserrat',sans-serif; margin-bottom:18px; }
.hero p{ color:#cbd5e1; line-height:1.8; max-width:700px; }
.client-box{ margin-top:32px; border-top:1px solid rgba(255,255,255,.08); padding-top:24px; }
.client-box strong{ color:#cbd5e1; }
.client-name{ font-size:30px; margin-top:8px; font-weight:800; }

/* CONTENT */
.content{ padding:52px; }
.section{ margin-bottom:30px; padding-bottom:30px; border-bottom: 1px dashed #cbd5e1; }
.section:last-child { border-bottom: none; }
.section-title{ font-family:'Montserrat',sans-serif; font-size:30px; margin-bottom:12px; }
.section-sub{ color:#64748b; line-height:1.8; margin-bottom:28px; }
.cards{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.card{ border:1px solid var(--border); border-radius:16px; padding:24px; }
.card h3{ margin-bottom:14px; font-size:18px; }
.card ul{ list-style:none; }
.card li{ margin-bottom:10px; padding-left:22px; position:relative; color:#475569; line-height:1.6; }
.card li::before{ content:'•'; color:var(--accent); position:absolute; left:0; font-weight:bold; font-size: 16px; }

/* PREÇOS / TIMELINE / CTA */
.price-area{ margin-top:24px; padding-top:18px; border-top:1px solid var(--border); }
.installment-line{ font-size:20px; font-weight:700; color:#111827; margin-bottom:6px; font-family:'Montserrat',sans-serif; }
.full-price{ font-size:14px; color:#64748b; }
.full-price strong{ font-weight:600; color:#0f172a; }
.price-note{ margin-top:8px; color:#64748b; font-size:12px; font-style: italic; }
.timeline{ border-left:2px solid #dbeafe; padding-left:24px; }
.timeline-item{ position:relative; margin-bottom:30px; }
.timeline-item::before{ content:''; width:14px; height:14px; border-radius:50%; background:#2563eb; position:absolute; left:-32px; top:5px; }
.cta{ background:#020617; color:white; padding:52px; text-align:center; }

/* ========================= */
/* CONFIGURAÇÃO DE IMPRESSÃO */
/* ========================= */
@media print{
    body, #preview, .page { display: block !important; height: auto !important; min-height: auto !important; }
    #panel{ display:none; }
    #preview{ margin:0; padding:0; }
    .page{ width:100%; box-shadow:none; }

    /* A MÁGICA ESTÁ AQUI: */
    .section { 
        break-inside: auto !important; /* Permite quebrar a seção se necessário */
        page-break-inside: auto !important;
        margin-bottom: 20px !important; 
        padding-bottom: 20px !important;
    }
    .card, .timeline-item { 
        break-inside: avoid; /* Mantém o card inteiro */
        page-break-inside: avoid;
    }
    h2, .section-title { break-after: avoid; } /* Evita título orfão */
}
</style>
</head>
<body>
<!-- (Conteúdo HTML permanece o mesmo do anterior) -->
<div id="panel"> <!-- ... (seu código do painel aqui) ... --> </div>
<div id="preview"> <div class="page"> <!-- ... (seu código de visualização aqui) ... --> </div> </div>
<script> /* ... (seu script JS aqui) ... */ </script>
</body>
</html>
